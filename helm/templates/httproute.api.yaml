apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.env }}-{{ .Values.api.appName }}-httproute
  namespace: {{ .Values.namespace }}
  labels:
    environment: {{ .Values.env }}
    version: {{ .Values.api.image.tag }}
spec:
  parentRefs:
    - name: {{ .Values.httproute.gatewayName }}
      namespace: {{ .Values.httproute.gatewayNamespace }}
      sectionName: {{ .Values.api.httproute.sectionName }}
  hostnames:
    - {{ .Values.api.httproute.hostname }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.env }}-{{ .Values.api.appName }}-svc
          port: {{ .Values.api.service.port }}
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
