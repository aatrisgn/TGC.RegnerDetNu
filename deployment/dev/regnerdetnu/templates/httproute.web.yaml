metadata:
  name: dev-regnerdetnu-web-httproute
  namespace: regnerdetnudev
  labels:
    environment: dev
    version: 1.0.14
spec:
  parentRefs:
    - name: gateway
      namespace: gatewayapi
      sectionName: dev-regnerdet-nu-https
  hostnames:
    - dev.regnerdet.nu
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: dev-regnerdetnu-web-svc
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
