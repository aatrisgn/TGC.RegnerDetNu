    - name: gateway
      namespace: gatewayapi
      sectionName: api-dev-regnerdet-nu-https
  hostnames:
    - api.dev.regnerdet.nu
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: dev-regnerdetnu-api-svc
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
