---
# Source: regnerdetnu/templates/deployment.api.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-regnerdetnu-api-deployment
  namespace: regnerdetnudev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dev-regnerdetnu-api-app
      version: v1
  template:
    metadata:
      labels:
        app: dev-regnerdetnu-api-app
        version: v1
    spec:
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      serviceAccountName: regnerdetnu-api-sa
      imagePullSecrets:
      - name: acr-pull
      containers:
      - name: regnerdetnu-api-pod
        image: tgclzdevacr.azurecr.io/tgc-regnerdetnu-api:1.0.7
        ports:
        - containerPort: 80
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: dev
        - name: CorsAllowedOrigins
          value: https://dev.regnerdet.nu
        - name: OPEN_WEATHER_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: open-weather-api-key
