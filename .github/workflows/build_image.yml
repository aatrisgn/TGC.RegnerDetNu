name: Build images
concurrency:
  group: ${{ github.workflow }}

on:
  push:
    branches: ["main"]
    paths:
    - 'src/**'
    - '.github/workflows/build_image.yml'
  pull_request:
    branches: ["main"]
    paths:
    - 'src/**'
    - '.github/workflows/build_image.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  tag_commit:
    runs-on: ubuntu-latest
    name: Generate commit tag
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Generate version
      id: version
      shell: pwsh
      run: ./.github/scripts/generate_version.ps1

  build_web_app_arm_job:
    needs: [tag_commit]
    runs-on: ubuntu-24.04-arm
    name: Build Web App ARM
    environment: dev
    env:
      image_name: tgc-regnerdetnu-app
      app_path: src/webapp
      sccr_registry: rg.fr-par.scw.cloud/crn-shared-prd-scr-lz-fr-par

    steps:
    - uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to SCR
      run: docker login ${{ env.sccr_registry }} -u nologin --password-stdin <<< "${{ secrets.REGNERDETNU_PRD_DEPLOYMENT_SECRET_ACCESS_KEY }}"

    - name: Build and publish webapp ARM to SCR
      run: |
        docker buildx build . \
          --platform linux/arm64 \
          --tag ${{ env.sccr_registry }}/${{ env.image_name }}:${{ needs.tag_commit.outputs.version }}-arm64 \
          --push
      working-directory: ${{ env.app_path }}

  build_web_app_amd_job:
    needs: [tag_commit]
    runs-on: ubuntu-latest
    name: Build Web App AMD
    environment: dev
    env:
      image_name: tgc-regnerdetnu-app
      app_path: src/webapp
      sccr_registry: rg.fr-par.scw.cloud/crn-shared-prd-scr-lz-fr-par

    steps:
    - uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to SCR
      run: docker login ${{ env.sccr_registry }} -u nologin --password-stdin <<< "${{ secrets.REGNERDETNU_PRD_DEPLOYMENT_SECRET_ACCESS_KEY }}"

    - name: Build and publish webapp AMD to SCR
      run: |
        docker buildx build . \
          --platform linux/amd64 \
          --tag ${{ env.sccr_registry }}/${{ env.image_name }}:${{ needs.tag_commit.outputs.version }}-amd64 \
          --push
      working-directory: ${{ env.app_path }}

  build_web_api_arm_job:
    needs: [tag_commit]
    runs-on: ubuntu-24.04-arm
    name: Build Web API ARM
    environment: dev
    env:
      image_name: tgc-regnerdetnu-api
      app_path: src/TGC.RegnerDetNu
      sccr_registry: rg.fr-par.scw.cloud/crn-shared-prd-scr-lz-fr-par

    steps:
    - uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to SCR
      run: docker login ${{ env.sccr_registry }} -u nologin --password-stdin <<< "${{ secrets.REGNERDETNU_PRD_DEPLOYMENT_SECRET_ACCESS_KEY }}"

    - name: Build and publish API ARM to SCR
      run: |
        docker buildx build . \
          --platform linux/arm64 \
          --tag ${{ env.sccr_registry }}/${{ env.image_name }}:${{ needs.tag_commit.outputs.version }}-arm64 \
          --push
      working-directory: ${{ env.app_path }}

  build_web_api_amd_job:
    needs: [tag_commit]
    runs-on: ubuntu-latest
    name: Build Web API AMD
    environment: dev
    env:
      image_name: tgc-regnerdetnu-api
      app_path: src/TGC.RegnerDetNu
      sccr_registry: rg.fr-par.scw.cloud/crn-shared-prd-scr-lz-fr-par

    steps:
    - uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to SCR
      run: docker login ${{ env.sccr_registry }} -u nologin --password-stdin <<< "${{ secrets.REGNERDETNU_PRD_DEPLOYMENT_SECRET_ACCESS_KEY }}"

    - name: Build and publish API AMD to SCR
      run: |
        docker buildx build . \
          --platform linux/amd64 \
          --tag ${{ env.sccr_registry }}/${{ env.image_name }}:${{ needs.tag_commit.outputs.version }}-amd64 \
          --push
      working-directory: ${{ env.app_path }}

  create_web_app_manifest_job:
    needs: [tag_commit, build_web_app_arm_job, build_web_app_amd_job]
    runs-on: ubuntu-latest
    name: Create Web App multi-platform manifest
    environment: dev
    env:
      image_name: tgc-regnerdetnu-app
      sccr_registry: rg.fr-par.scw.cloud/crn-shared-prd-scr-lz-fr-par

    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to SCR
      run: docker login ${{ env.sccr_registry }} -u nologin --password-stdin <<< "${{ secrets.REGNERDETNU_PRD_DEPLOYMENT_SECRET_ACCESS_KEY }}"

    - name: Create and push multi-platform manifest
      run: |
        TAGS="--tag ${{ env.sccr_registry }}/${{ env.image_name }}:${{ needs.tag_commit.outputs.version }}"
        if [ "${{ github.ref }}" = "refs/heads/main" ]; then
          TAGS="$TAGS --tag ${{ env.sccr_registry }}/${{ env.image_name }}:latest"
        fi
        docker buildx imagetools create \
          $TAGS \
          ${{ env.sccr_registry }}/${{ env.image_name }}:${{ needs.tag_commit.outputs.version }}-arm64 \
          ${{ env.sccr_registry }}/${{ env.image_name }}:${{ needs.tag_commit.outputs.version }}-amd64

  create_web_api_manifest_job:
    needs: [tag_commit, build_web_api_arm_job, build_web_api_amd_job]
    runs-on: ubuntu-latest
    name: Create Web API multi-platform manifest
    environment: dev
    env:
      image_name: tgc-regnerdetnu-api
      sccr_registry: rg.fr-par.scw.cloud/crn-shared-prd-scr-lz-fr-par

    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to SCR
      run: docker login ${{ env.sccr_registry }} -u nologin --password-stdin <<< "${{ secrets.REGNERDETNU_PRD_DEPLOYMENT_SECRET_ACCESS_KEY }}"

    - name: Create and push multi-platform manifest
      run: |
        TAGS="--tag ${{ env.sccr_registry }}/${{ env.image_name }}:${{ needs.tag_commit.outputs.version }}"
        if [ "${{ github.ref }}" = "refs/heads/main" ]; then
          TAGS="$TAGS --tag ${{ env.sccr_registry }}/${{ env.image_name }}:latest"
        fi
        docker buildx imagetools create \
          $TAGS \
          ${{ env.sccr_registry }}/${{ env.image_name }}:${{ needs.tag_commit.outputs.version }}-arm64 \
          ${{ env.sccr_registry }}/${{ env.image_name }}:${{ needs.tag_commit.outputs.version }}-amd64

  push_git_tag:
    needs: [tag_commit, create_web_app_manifest_job, create_web_api_manifest_job]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Tag commit

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Tag commit
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag ${{ needs.tag_commit.outputs.version }}
        git push origin ${{ needs.tag_commit.outputs.version }}
