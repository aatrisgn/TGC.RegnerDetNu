name: Build images
concurrency:
  group: ${{ github.workflow }}

on:
  push:
    branches: ["main"]
    paths:
    - 'src/webapp'
    - '.github/workflows/build_image.yml'
  pull_request:
    branches: ["main"]
    paths:
    - 'src/webapp'
    - '.github/workflows/build_image.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build_job:
    runs-on: ubuntu-latest
    name: Build and deploy to ACR
    environment: dev
    env:
      image_name: tgc-regnerdetnu-app
      app_path: src/webapp
      acr_registry: tgclzdevacr.azurecr.io

    steps:
    - uses: actions/checkout@v3

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 'Az CLI login'
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.REGNERDETNU_DEV_CLIENT_ID }}
        tenant-id: ${{ secrets.REGNERDETNU_DEV_TENANT_ID }}
        subscription-id: ${{ secrets.REGNERDETNU_DEV_SUBSCRIPTION_ID }}

    - name: Login to ACR
      run: az acr login --name tgclzdevacr.azurecr.io

    - name: Build and publish webapp to ACR
      run: |
        docker buildx build . \
          --platform linux/amd64,linux/arm64 \
          --tag $acr_registry/$image_name:${{ github.sha }} \
          --tag $acr_registry/$image_name:latest \
          --push
      working-directory: ${{ env.app_path }}