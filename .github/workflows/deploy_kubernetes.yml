name: Generate Kubernetes manifests

on:
  push:
    paths:
      - 'helm/**'
      - 'terraform/deployment/**'
      - '.github/workflows/deploy_kubernetes.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to generate manifests for'
        required: true
        type: choice
        options:
          - dev
          - prd
      applyTF:
        description: 'Apply Terraform?'
        required: true
        type: boolean
      software_version:
        required: false
        default: 'latest'
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  generate-dev:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    runs-on: ubuntu-latest
    name: Generate DEV manifests
    environment: dev

    env:
      ARM_CLIENT_ID: "${{ secrets.REGNERDETNU_DEV_CLIENT_ID }}"
      ARM_SUBSCRIPTION_ID: "${{ secrets.REGNERDETNU_DEV_SUBSCRIPTION_ID }}"
      ARM_TENANT_ID: "${{ secrets.REGNERDETNU_DEV_TENANT_ID }}"
      ARM_USE_AZUREAD: true

    steps:
      - uses: actions/checkout@v4
        with:
          path: regnerdetnu

      - name: Checkout ArgoCD repo
        uses: actions/checkout@v4
        with:
          repository: aatrisgn/TGC.ArgoCD
          token: ${{ secrets.ARGOCD_REPO_WRITE_TOKEN }}
          path: argocd

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Install Terraform CLI
        uses: aatrisgn/TGC.Templates/actions/install_terraform@main
      
      - name: Install Scaleway CLI
        uses: aatrisgn/TGC.Templates/actions/install_scaleway@main

      - name: Resolve image tag
        id: resolve_tag
        shell: pwsh
        run: |
          regnerdetnu/.github/scripts/fetch_latest_image_versions.ps1 `
            -registryNamespace "crn-shared-prd-scr-lz-fr-par" `
            -imageNames @("tgc-regnerdetnu-app", "tgc-regnerdetnu-api") `
            -inputTag "${{ github.event.inputs.software_version || 'latest' }}"

      - name: Render manifests DEV
        run: |
          helm template backend ./helm \
            -f ./helm/values-dev.yaml \
            --set web.image.tag=${{ steps.resolve_tag.outputs.tgc-regnerdetnu-app_version }} \
            --set api.image.tag=${{ steps.resolve_tag.outputs.tgc-regnerdetnu-api_version }} \
            --output-dir ./deployment/dev
        working-directory: regnerdetnu

      - name: Terraform Init
        run: |
          terraform init \
          -backend-config=resource_group_name="${{ secrets.REGNERDETNU_DEV_TFSTATE_RESOURCE_GROUP_NAME }}" \
          -backend-config=storage_account_name="${{ secrets.REGNERDETNU_DEV_TFSTATE_STORAGE_ACCOUNT_NAME }}" \
          -backend-config=container_name="${{ secrets.REGNERDETNU_DEV_TFSTATE_STORAGE_CONTAINER_NAME }}" \
          -backend-config=key="regnerdetnu.deployment.dev"
        working-directory: regnerdetnu/terraform/deployment

      - name: Terraform Validate
        run: terraform validate
        working-directory: regnerdetnu/terraform/deployment

      - name: Terraform Plan
        id: plan
        run: terraform plan -input=false -var-file="envs/vars.dev.tfvars" -out=tfplan
        working-directory: regnerdetnu/terraform/deployment

      - name: Terraform Apply
        if: github.event.inputs.applyTF == 'true'
        run: terraform apply -auto-approve tfplan
        working-directory: regnerdetnu/terraform/deployment

      - name: Commit rendered manifests
        run: |
          cd argocd && git pull
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git diff --cached --quiet || git commit -m "[TGC.RegnerDetNu] chore: render dev manifests [${{ github.ref_name }}]"
          git push

  generate-prd:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.event.inputs.environment == 'prd'
    runs-on: ubuntu-latest
    name: Generate PRD manifests
    environment: prd

    env:
      ARM_CLIENT_ID: "${{ secrets.REGNERDETNU_PRD_CLIENT_ID }}"
      ARM_SUBSCRIPTION_ID: "${{ secrets.REGNERDETNU_PRD_SUBSCRIPTION_ID }}"
      ARM_TENANT_ID: "${{ secrets.REGNERDETNU_PRD_TENANT_ID }}"
      ARM_USE_AZUREAD: true

    steps:
      - uses: actions/checkout@v4
        with:
          path: regnerdetnu

      - name: Checkout ArgoCD repo
        uses: actions/checkout@v4
        with:
          repository: aatrisgn/TGC.ArgoCD
          token: ${{ secrets.ARGOCD_REPO_WRITE_TOKEN }}
          path: argocd

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Install Terraform CLI
        uses: aatrisgn/TGC.Templates/actions/install_terraform@main
      
      - name: Install Scaleway CLI
        uses: aatrisgn/TGC.Templates/actions/install_scaleway@main

      - name: Resolve image tags
        id: resolve_tag
        shell: pwsh
        run: |
          regnerdetnu/.github/scripts/fetch_latest_image_versions.ps1 `
            -registryNamespace "crn-shared-prd-scr-lz-fr-par" `
            -imageNames @("tgc-regnerdetnu-app", "tgc-regnerdetnu-api") `
            -inputTag "${{ github.event.inputs.software_version || 'latest' }}"

      - name: Render manifests PRD
        run: |
          helm template backend ./helm \
            -f ./helm/values-prd.yaml \
            --set web.image.tag=${{ steps.resolve_tag.outputs.tgc-regnerdetnu-app_version }} \
            --set api.image.tag=${{ steps.resolve_tag.outputs.tgc-regnerdetnu-api_version }} \
            --output-dir ./deployment/prd
        working-directory: regnerdetnu

      - name: Terraform Init
        run: |
          terraform init \
          -backend-config=resource_group_name="${{ secrets.REGNERDETNU_PRD_TFSTATE_RESOURCE_GROUP_NAME }}" \
          -backend-config=storage_account_name="${{ secrets.REGNERDETNU_PRD_TFSTATE_STORAGE_ACCOUNT_NAME }}" \
          -backend-config=container_name="${{ secrets.REGNERDETNU_PRD_TFSTATE_STORAGE_CONTAINER_NAME }}" \
          -backend-config=key="regnerdetnu.deployment.prd"
        working-directory: regnerdetnu/terraform/deployment

      - name: Terraform Validate
        run: terraform validate
        working-directory: regnerdetnu/terraform/deployment

      - name: Terraform Plan
        id: plan
        run: terraform plan -input=false -var-file="envs/vars.prd.tfvars" -out=tfplan
        working-directory: regnerdetnu/terraform/deployment

      - name: Terraform Apply
        if: github.event.inputs.applyTF == 'true'
        run: terraform apply -auto-approve tfplan
        working-directory: regnerdetnu/terraform/deployment

      - name: Commit rendered manifests
        run: |
          cd argocd && git pull
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git diff --cached --quiet || git commit -m "[TGC.RegnerDetNu] chore: render prd manifests [${{ github.ref_name }}]"
          git push