services:
  api:
    build:
      context: ./TGC.RegnerDetNu
      dockerfile: Dockerfile
    ports:
      - "8787:8080"
    environment:
      - OPEN_WEATHER_API_KEY=${OPEN_WEATHER_API_KEY}
      - CorsAllowedOrigins=http://localhost:4500
      - ASPNETCORE_ENVIRONMENT=dev

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    ports:
      - "4500:80"
    environment:
      - API_URL=http://localhost:8787
      - ENVIRONMENT_TYPE=dev
    depends_on:
      - api
