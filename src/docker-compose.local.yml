services:
  api:
    build:
      context: ./TGC.RegnerDetNu
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - OPEN_WEATHER_API_KEY=${OPEN_WEATHER_API_KEY}
      - CorsAllowedOrigins=http://localhost

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - API_URL=http://localhost:8080
      - ENVIRONMENT_TYPE=local
    depends_on:
      - api
